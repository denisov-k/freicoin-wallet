# Crawler control for the Freicoin explorer (freicoin.ru/explorer).
# robots.txt asks nicely; this enforces. GPTBot alone walked 149k explorer pages
# (every one an RPC to the node) before robots.txt landed.
map $http_user_agent $fw_crawler {
    default 0;
    ~*(GPTBot|ClaudeBot|CCBot|Bytespider|Amazonbot|meta-externalagent|MJ12bot|AhrefsBot|SemrushBot|DotBot|BLEXBot|DataForSeoBot|PetalBot|serpstatbot|ZoominfoBot) 1;
}
# per-IP throttle for anonymous scrapers that fake a browser UA
limit_req_zone $binary_remote_addr zone=fw_explorer:10m rate=2r/s;
